name: Build release artifacts

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Derive version from tag
        id: version
        run: |
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building moldscript $version"

      - name: Patch setup.py with tag version
        run: |
          python - <<'PY'
          import os, re, pathlib
          version = os.environ["VERSION"]
          path = pathlib.Path("setup.py")
          text = path.read_text()
          new = re.sub(r'^version\s*=\s*".*"', f'version = "{version}"', text, count=1, flags=re.M)
          if new == text:
              raise SystemExit("Failed to patch version in setup.py")
          path.write_text(new)
          PY
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Attach artifacts to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber
